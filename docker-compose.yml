services:
  mysql:
    image: mysql:8.0
    container_name: tindung-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-Hai@17022005}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-app_tindung}
    ports:
      - "${MYSQL_HOST_PORT:-3307}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${MYSQL_ROOT_PASSWORD:-123456789}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - tindung-net

  backend:
    build:
      context: ./backend
    container_name: tindung-backend
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__MySql: "server=mysql;port=3306;database=${MYSQL_DATABASE:-app_tindung};user=root;password=${MYSQL_ROOT_PASSWORD:-123456789};"
    ports:
      - "5285:8080"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - tindung-net

  frontend:
    build:
      context: ./frontend
    container_name: tindung-frontend
    restart: unless-stopped
    ports:
      - "4200:80"
    depends_on:
      - backend
    networks:
      - tindung-net

volumes:
  mysql_data:

networks:
  tindung-net:
    driver: bridge
